# ─── rustfmt configuration ──────────────────────────────────────────
# Run with: cargo fmt
# Check without modifying: cargo fmt --check
#
# NOTE: Only stable options are enabled here.
# To use nightly options, uncomment the settings below and run:
#   cargo +nightly fmt

# Maximum line width before wrapping
max_width = 100

# Use 4-space indentation (Rust standard)
tab_spaces = 4
hard_tabs = false

# Use field init shorthand: `Point { x, y }` instead of `Point { x: x, y: y }`
use_field_init_shorthand = true

# Use `?` operator shorthand for try!
use_try_shorthand = true

# Reorder imports alphabetically
reorder_imports = true

# Reorder module declarations alphabetically
reorder_modules = true

# ─── Nightly-only options (uncomment with `cargo +nightly fmt`) ─────
# imports_granularity = "Module"
# group_imports = "StdExternalCrate"
# trailing_comma = "Vertical"
# brace_style = "SameLineWhere"
# format_strings = false
# blank_lines_upper_bound = 2
