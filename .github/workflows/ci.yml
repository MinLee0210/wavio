name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Check formatting
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt -- --check
        env:
          CARGO_INCREMENTAL: 0

  # Lint with Clippy
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --all-targets --all-features -- -D warnings
        env:
          CARGO_INCREMENTAL: 0

  # Run tests
  test:
    name: Tests (${{ matrix.os }}, features=${{ matrix.features || 'none' }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        features: ["", "persist"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run unit tests (no features)
        if: matrix.features == ''
        run: cargo test --lib --verbose
      - name: Run unit tests (with features)
        if: matrix.features != ''
        run: cargo test --lib --all-features --verbose
      - name: Run integration tests
        run: cargo test --tests --all-features --verbose
      - name: Run doc tests
        run: cargo test --doc --all-features


  # Build check
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --verbose
      - run: cargo build --all-features --verbose

  # MSRV check (Minimum Supported Rust Version)
  msrv:
    name: MSRV Check (1.85.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85.0
      - run: cargo build --verbose
